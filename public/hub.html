<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ReOrderly Station</title>
<link rel="icon" type="image/png" href="/icon.png">
<meta name="theme-color" content="#0a0c0b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0c0b;
  --surface: #131614;
  --surface2: #1a1e1c;
  --surface3: #222622;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --green: #1D9E75;
  --green-light: #25c490;
  --green-dim: rgba(29,158,117,0.12);
  --text: #f0f2f0;
  --text2: #8a9490;
  --text3: #3d4440;
  --youtube: #ff2020;
  --spotify: #1ed760;
  --ring: #e8621a;
  --walmart: #0071CE;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Syne', sans-serif;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 50% 70% at 0% 100%, rgba(29,158,117,0.07) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ── MAIN 2-COLUMN LAYOUT ── */
.hub {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 10px;
  padding: 10px;
}

/* ── LEFT COLUMN ── */
.col-left {
  display: flex; flex-direction: column; gap: 10px;
  min-height: 0;
}

/* ReOrderly iframe panel */
.ro-panel {
  flex: 1;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
  min-height: 0;
  position: relative;
}

.ro-panel iframe {
  width: 100%; height: 100%;
  border: none; display: block;
}

/* Scanner bar */
.scanner-bar {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 8px;
}

.scanner-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: blink 2s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

.scanner-text {
  font-size: 10px; font-family: 'DM Mono', monospace;
  color: var(--text2); flex: 1;
}

.scanner-ready {
  font-size: 10px; font-weight: 700;
  color: var(--green); font-family: 'DM Mono', monospace;
}

/* ── RIGHT COLUMN ── */
.col-right {
  display: flex; flex-direction: column; gap: 10px;
  min-height: 0;
}

/* ── TOP ROW: Clock + Weather ── */
.top-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  flex-shrink: 0;
}

.clock-widget {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 20px;
  display: flex; flex-direction: column;
  justify-content: center;
}

.clock-time {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(44px, 5vw, 64px);
  color: var(--text); letter-spacing: 3px; line-height: 1;
}

.clock-date {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--text2);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-top: 5px;
}

.weather-widget {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 20px;
  display: flex; align-items: center; gap: 12px;
}

.weather-icon { font-size: 32px; flex-shrink: 0; }

.weather-temp {
  font-size: 26px; font-weight: 800;
  color: var(--text); line-height: 1;
}

.weather-desc {
  font-size: 11px; color: var(--text2);
  font-family: 'DM Mono', monospace; margin-top: 3px;
}

.weather-loc {
  font-size: 9px; color: var(--text3);
  font-family: 'DM Mono', monospace; margin-top: 2px;
}

.weather-loading {
  font-size: 11px; color: var(--text3);
  font-family: 'DM Mono', monospace;
}

/* ── APP GRID ── */
.app-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  flex-shrink: 0;
}

.app-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
  position: relative; overflow: hidden;
}

.app-tile::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px; border-radius: 18px 18px 0 0;
}

.app-tile.yt::before { background: var(--youtube); }
.app-tile.sp::before { background: var(--spotify); }
.app-tile.wm::before { background: var(--walmart); }
.app-tile.rg::before { background: var(--ring); }

.app-tile:hover, .app-tile:active {
  transform: scale(0.97);
  border-color: var(--border2);
  background: var(--surface2);
}

.app-tile-icon { font-size: 26px; flex-shrink: 0; }

.app-tile-info { flex: 1; min-width: 0; }

.app-tile-name {
  font-size: 14px; font-weight: 800; color: var(--text);
}

.app-tile-desc {
  font-size: 10px; color: var(--text2);
  font-family: 'DM Mono', monospace; margin-top: 2px;
}

.app-tile-badge {
  font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 6px;
  letter-spacing: 0.06em; text-transform: uppercase;
  flex-shrink: 0;
}

.badge-live { background: rgba(232,98,26,0.2); color: var(--ring); }

/* ── BOTTOM ROW: Ring + Slideshow tab ── */
.bottom-row {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  min-height: 0;
}

.ring-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  display: flex; flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  position: relative; overflow: hidden;
}

.ring-panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--ring);
}

.ring-panel:active { transform: scale(0.98); }

.ring-top {
  display: flex; align-items: center;
  justify-content: space-between;
}

.ring-icon-title {
  display: flex; align-items: center; gap: 8px;
}

.ring-emoji { font-size: 22px; }
.ring-name { font-size: 16px; font-weight: 800; color: var(--text); }

.ring-live-badge {
  font-size: 9px; font-weight: 700;
  background: rgba(232,98,26,0.2); color: var(--ring);
  padding: 3px 8px; border-radius: 6px;
  letter-spacing: 0.08em; text-transform: uppercase;
  animation: blink 2s ease-in-out infinite;
}

.ring-status {
  font-size: 11px; color: var(--text2);
  font-family: 'DM Mono', monospace;
}

.ring-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px; padding: 9px;
  font-family: 'Syne', sans-serif;
  font-size: 12px; font-weight: 700;
  color: var(--text2); text-align: center;
  cursor: pointer; transition: all 0.15s;
}

.ring-btn:hover { color: var(--ring); border-color: var(--ring); }

/* ── SLIDESHOW TAB ── */
.slideshow-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  display: flex; flex-direction: column;
  cursor: pointer;
  transition: border-color 0.15s;
  position: relative;
}

.slideshow-panel:hover { border-color: var(--border2); }

.slideshow-header {
  padding: 10px 14px;
  display: flex; align-items: center;
  justify-content: space-between;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.slideshow-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 800; color: var(--text);
}

.slideshow-title-icon { font-size: 16px; }

.slideshow-fullscreen-btn {
  font-size: 10px; font-weight: 700;
  color: var(--text3); letter-spacing: 0.06em;
  text-transform: uppercase;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 8px;
  cursor: pointer; transition: all 0.15s;
  font-family: 'Syne', sans-serif;
}

.slideshow-fullscreen-btn:hover { color: var(--text2); border-color: var(--border2); }

.slideshow-body {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 16px; text-align: center;
}

.ss-panel-icon { font-size: 32px; opacity: 0.3; }

.ss-panel-text {
  font-size: 12px; font-weight: 700; color: var(--text2);
}

.ss-panel-sub {
  font-size: 10px; color: var(--text3);
  font-family: 'DM Mono', monospace;
  line-height: 1.5;
}

.ss-panel-btn {
  background: var(--green);
  color: #fff; border: none;
  border-radius: 10px; padding: 8px 18px;
  font-family: 'Syne', sans-serif;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
  margin-top: 4px;
}

.ss-panel-btn:hover { background: var(--green-light); }

/* ── FLOATING MINI WINDOW ── */
.float-win {
  display: none;
  position: fixed; z-index: 400;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  width: 400px; height: 260px;
  bottom: 20px; right: 20px;
  flex-direction: column;
}

.float-win.active { display: flex; }
.float-win.big {
  width: calc(100vw - 410px) !important;
  height: calc(100vh - 20px) !important;
  top: 10px !important; right: 10px !important;
  bottom: auto !important; left: auto !important;
}

.float-bar {
  display: flex; align-items: center;
  padding: 7px 10px; gap: 8px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  cursor: grab; flex-shrink: 0;
}

.float-bar:active { cursor: grabbing; }

.float-info {
  display: flex; align-items: center; gap: 6px; flex: 1;
}

.float-ico { font-size: 13px; }
.float-lbl { font-size: 12px; font-weight: 700; color: var(--text2); }

.float-ctrls { display: flex; gap: 4px; }

.fctl {
  width: 26px; height: 26px;
  border: 1px solid var(--border);
  border-radius: 7px; background: var(--surface3);
  color: var(--text2); font-size: 11px;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.15s;
}

.fctl:hover { border-color: var(--border2); color: var(--text); }
.fctl.cls:hover { border-color: #dc2626; color: #dc2626; }

.float-body {
  flex: 1; position: relative;
  overflow: hidden; background: #000;
}

.float-iframe { width: 100%; height: 100%; border: none; }

.float-fallback {
  display: none; width: 100%; height: 100%;
  flex-direction: column; align-items: center;
  justify-content: center; gap: 10px;
  padding: 1.5rem; text-align: center;
}

.fb-icon { font-size: 32px; }
.fb-title { font-size: 14px; font-weight: 800; color: var(--text); }
.fb-text { font-size: 11px; color: var(--text2); line-height: 1.5; max-width: 260px; }

.fb-btn {
  background: var(--green); color: #fff; border: none;
  border-radius: 10px; padding: 9px 20px;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; margin-top: 4px;
}

/* ── SCREENSAVER ── */
.screensaver {
  display: none; position: fixed; inset: 0;
  z-index: 500; background: #000;
  flex-direction: column; align-items: center;
  justify-content: center; cursor: pointer;
  gap: 0;
}

.screensaver.active { display: flex; }

.ss-time {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(90px, 16vw, 160px);
  color: rgba(255,255,255,0.88);
  letter-spacing: 6px; line-height: 1;
  animation: ssFloat 8s ease-in-out infinite;
  text-shadow: 0 4px 40px rgba(0,0,0,0.4);
}

.ss-date {
  font-family: 'DM Mono', monospace;
  font-size: 14px; color: rgba(255,255,255,0.5);
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-top: 12px;
  animation: ssFloat 8s ease-in-out infinite;
}

.ss-brand {
  font-size: 11px; font-weight: 800;
  color: rgba(255,255,255,0.15);
  letter-spacing: 0.15em; margin-top: 24px;
}

.ss-hint {
  font-size: 10px; color: rgba(255,255,255,0.12);
  font-family: 'DM Mono', monospace;
  margin-top: 6px; letter-spacing: 0.1em;
}

@keyframes ssFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-size: 12px; font-family: 'Syne', sans-serif;
  padding: 9px 18px; border-radius: 99px;
  transition: transform 0.25s ease;
  white-space: nowrap; pointer-events: none; z-index: 600;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ── YOUTUBE MINI PLAYER ── */
.yt-mini {
  display: none;
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: min(420px, 38vw);
  aspect-ratio: 16 / 9;
  background: #000;
  border-radius: 14px;
  overflow: hidden;
  z-index: 9999;
  box-shadow: 0 10px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.1);
}

.yt-mini.active { display: block; }

.yt-mini.big {
  width: min(860px, 75vw) !important;
  bottom: 20px !important;
  right: 20px !important;
}

.yt-mini iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}

.yt-controls {
  position: absolute;
  top: 8px; right: 8px;
  display: flex; gap: 4px;
  z-index: 2;
}

.yt-btn {
  width: 28px; height: 28px;
  background: rgba(0,0,0,0.65);
  color: #fff; border: none;
  border-radius: 999px;
  font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}

.yt-btn:hover { background: rgba(0,0,0,0.9); }

.yt-drag-bar {
  position: absolute;
  top: 0; left: 0; right: 48px;
  height: 36px;
  cursor: grab;
  z-index: 2;
}

.yt-drag-bar:active { cursor: grabbing; }

</style>
</head>
<body>

<div class="hub">

  <!-- LEFT: ReOrderly -->
  <div class="col-left">
    <div class="ro-panel">
      <iframe src="/app.html" allow="camera; microphone" id="ro-frame"></iframe>
    </div>
    <div class="scanner-bar">
      <div class="scanner-dot"></div>
      <div class="scanner-text">USB-C Scanner connected</div>
      <div class="scanner-ready">Ready</div>
    </div>
  </div>

  <!-- RIGHT: Everything else -->
  <div class="col-right">

    <!-- Clock + Weather -->
    <div class="top-row">
      <div class="clock-widget">
        <div class="clock-time" id="clock-time">12:00 PM</div>
        <div class="clock-date" id="clock-date">Monday, January 1</div>
      </div>
      <div class="weather-widget" id="weather-widget">
        <div class="weather-loading">Loading weather...</div>
      </div>
    </div>

    <!-- App tiles -->
    <div class="app-grid">
      <div class="app-tile yt" onclick="openYouTube()">
        <div class="app-tile-icon">▶️</div>
        <div class="app-tile-info">
          <div class="app-tile-name">YouTube</div>
          <div class="app-tile-desc">Play in corner</div>
        </div>
      </div>
      <div class="app-tile sp" onclick="openApp('spotify')">
        <div class="app-tile-icon">🎵</div>
        <div class="app-tile-info">
          <div class="app-tile-name">Spotify</div>
          <div class="app-tile-desc">Kitchen playlist</div>
        </div>
      </div>


    </div>

    <!-- Slideshow panel -->
    <div class="bottom-row">

      <div class="slideshow-panel" id="slideshow-panel" style="grid-column:1/-1;">
        <div class="slideshow-header">
          <div class="slideshow-title">
            <span class="slideshow-title-icon">🖼️</span>
            Photo Frame
          </div>
        </div>
        <div class="slideshow-body" id="slideshow-body" style="padding:0;position:relative;overflow:hidden;">
          <div id="slide-a" class="slide" style="position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 1.5s ease;opacity:1;"></div>
          <div id="slide-b" class="slide" style="position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 1.5s ease;opacity:0;"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;padding:10px 12px;background:linear-gradient(to top,rgba(0,0,0,0.5),transparent);display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.6);font-family:'DM Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;">Photo Frame</span>
            <button onclick="ssOn()" style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:5px;padding:3px 8px;cursor:pointer;font-family:'Syne',sans-serif;">⛶ Full</button>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- Floating Mini Window -->
<div class="float-win" id="float-win">
  <div class="float-bar" id="float-bar">
    <div class="float-info">
      <span class="float-ico" id="float-ico"></span>
      <span class="float-lbl" id="float-lbl"></span>
    </div>
    <div class="float-ctrls">
      <div class="fctl" onclick="floatToggleSize()" id="fctl-size" title="Expand">⬆</div>
      <div class="fctl cls" onclick="floatClose()" title="Close">✕</div>
    </div>
  </div>
  <div class="float-body">
    <iframe class="float-iframe" id="float-frame" src="" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>
    <div class="float-fallback" id="float-fallback">
      <div class="fb-icon" id="fb-ico"></div>
      <div class="fb-title" id="fb-ttl"></div>
      <div class="fb-text" id="fb-txt"></div>
      <button class="fb-btn" id="fb-btn">Open →</button>
    </div>
  </div>
</div>

<!-- Screensaver / Slideshow -->
<div class="screensaver" id="screensaver" onclick="ssOff()">
  <div class="ss-time" id="ss-time">12:00 PM</div>
  <div class="ss-date" id="ss-date">Monday, January 1</div>
  <div class="ss-brand">ReOrderly Station</div>
  <div class="ss-hint">Tap anywhere to wake</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CLOCK ──
function tick() {
  const now = new Date();
  const h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const timeStr = `${h12}:${m} ${ampm}`;
  const dateStr = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  document.getElementById('clock-time').textContent = timeStr;
  document.getElementById('clock-date').textContent = dateStr;
  document.getElementById('ss-time').textContent = timeStr;
  document.getElementById('ss-date').textContent = dateStr;
}
tick();
setInterval(tick, 1000);

// ── WEATHER ──
async function loadWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.2373&longitude=-80.8184&current_weather=true&temperature_unit=fahrenheit');
    const d = await r.json();
    const temp = Math.round(d.current_weather.temperature);
    const code = d.current_weather.weathercode;
    const icons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
    const descs = {0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Foggy',51:'Drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Showers',81:'Rain showers',82:'Thunderstorms',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
    document.getElementById('weather-widget').innerHTML = `
      <div class="weather-icon">${icons[code]||'🌡️'}</div>
      <div>
        <div class="weather-temp">${temp}°F</div>
        <div class="weather-desc">${descs[code]||'Unknown'}</div>
        <div class="weather-loc">Warren, OH</div>

// ── APP CONFIG ──
const APPS = {
  spotify:  { name:'Spotify',  ico:'🎵', url:'https://open.spotify.com', embed:false, fbTitle:'Open Spotify', fbText:'Spotify cannot be embedded. Tap to open — use back button to return to hub.' },
  ring:     { name:'Ring',     ico:'🔔', url:'https://account.ring.com/account/dashboard', embed:false, fbTitle:'Open Ring', fbText:'Tap to open Ring cameras — use back button to return to hub.' },
};

// ── OPEN APP ──
let floatBig = false;

function openApp(id) {
  const app = APPS[id];
  if (!app) return;

  const win = document.getElementById('float-win');
  const frame = document.getElementById('float-frame');
  const fallback = document.getElementById('float-fallback');

  document.getElementById('float-ico').textContent = app.ico;
  document.getElementById('float-lbl').textContent = app.name;

  floatBig = false;
  win.classList.remove('big');
  win.style.cssText = '';
  win.classList.add('active');
  document.getElementById('fctl-size').textContent = '⬆';
  resetIdle();

  if (app.embed) {
    frame.style.display = 'block';
    fallback.style.display = 'none';
    frame.src = app.url;
  } else {
    frame.style.display = 'none';
    frame.src = '';
    fallback.style.display = 'flex';
    document.getElementById('fb-ico').textContent = app.ico;
    document.getElementById('fb-ttl').textContent = app.fbTitle;
    document.getElementById('fb-txt').textContent = app.fbText;
    const btn = document.getElementById('fb-btn');
    btn.onclick = () => {
      if (window.fully && fully.loadURL) {
        fully.loadURL(app.url);
      } else {
        // On Android tablet: try intent to open native app
        const intents = {
          youtube: 'intent://www.youtube.com#Intent;scheme=https;package=com.google.android.youtube;end',
          spotify: 'intent://open.spotify.com#Intent;scheme=https;package=com.spotify.music;end',
        };
        if (intents[id]) {
          window.location.href = intents[id];
          setTimeout(() => { window.open(app.url, '_blank'); }, 1500);
        } else {
          window.open(app.url, '_blank');
        }
      }
    };
  }
}

// ── FLOAT CONTROLS ──
function floatToggleSize() {
  const win = document.getElementById('float-win');
  const btn = document.getElementById('fctl-size');
  floatBig = !floatBig;
  if (floatBig) {
    win.classList.add('big');
    win.style.cssText = '';
    btn.textContent = '⬇';
  } else {
    win.classList.remove('big');
    win.style.cssText = '';
    btn.textContent = '⬆';
  }
}

function floatClose() {
  const win = document.getElementById('float-win');
  const frame = document.getElementById('float-frame');
  win.classList.remove('active','big');
  win.style.cssText = '';
  floatBig = false;
  setTimeout(() => { frame.src = ''; }, 300);

}

// ── DRAG ──
let dragging = false, dragOff = {x:0,y:0};

const floatBar = document.getElementById('float-bar');

if (floatBar) floatBar.addEventListener('mousedown', e => {
  if (floatBig) return;
  dragging = true;
  const win = document.getElementById('float-win');
  const r = win.getBoundingClientRect();
  dragOff = {x: e.clientX - r.left, y: e.clientY - r.top};
  win.style.bottom = 'auto'; win.style.right = 'auto';
  win.style.left = r.left+'px'; win.style.top = r.top+'px';
});

if (floatBar) floatBar.addEventListener('touchstart', e => {
  if (floatBig) return;
  dragging = true;
  const win = document.getElementById('float-win');
  const r = win.getBoundingClientRect();
  const t = e.touches[0];
  dragOff = {x: t.clientX - r.left, y: t.clientY - r.top};
  win.style.bottom = 'auto'; win.style.right = 'auto';
  win.style.left = r.left+'px'; win.style.top = r.top+'px';
}, {passive:true});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const win = document.getElementById('float-win');
  win.style.left = Math.max(0, Math.min(e.clientX - dragOff.x, window.innerWidth - win.offsetWidth))+'px';
  win.style.top  = Math.max(0, Math.min(e.clientY - dragOff.y, window.innerHeight - win.offsetHeight))+'px';
});

document.addEventListener('touchmove', e => {
  if (!dragging) return;
  const win = document.getElementById('float-win');
  const t = e.touches[0];
  win.style.left = Math.max(0, Math.min(t.clientX - dragOff.x, window.innerWidth - win.offsetWidth))+'px';
  win.style.top  = Math.max(0, Math.min(t.clientY - dragOff.y, window.innerHeight - win.offsetHeight))+'px';
}, {passive:true});

document.addEventListener('mouseup', () => dragging = false);
document.addEventListener('touchend', () => dragging = false);

// ── SCREENSAVER ──
let idleTimer;
const IDLE_MS = 5 * 60 * 1000;

function ssOn() {
  document.getElementById('screensaver').classList.add('active');
}

function ssOff() {
  document.getElementById('screensaver').classList.remove('active');
  resetIdle();
}

function resetIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(ssOn, IDLE_MS);
}

['mousedown','touchstart','keydown'].forEach(e => {
  document.addEventListener(e, resetIdle, {passive:true});
});

resetIdle();

// Replace these URLs with local photo paths on the tablet
// e.g. 'file:///sdcard/Pictures/photo1.jpg' or a Google Photos shared album
const PHOTOS = [
  'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=800&q=80', // kitchen
  'https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6?w=800&q=80', // home
  'https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=800&q=80', // living room
  'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=800&q=80', // family dinner
  'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=800&q=80', // friends
];

let slideIndex = 0;
let activeSlide = 'a';

function initSlideshow() {
  const a = document.getElementById('slide-a');
  const b = document.getElementById('slide-b');
  if (!a || !b || PHOTOS.length === 0) return;
  a.style.backgroundImage = `url('${PHOTOS[0]}')`;
  b.style.backgroundImage = `url('${PHOTOS[1] || PHOTOS[0]}')`;
  setInterval(nextSlide, 6000);
}

function nextSlide() {
  slideIndex = (slideIndex + 1) % PHOTOS.length;
  const nextIndex = (slideIndex + 1) % PHOTOS.length;
  const a = document.getElementById('slide-a');
  const b = document.getElementById('slide-b');
  if (!a || !b) return;

  if (activeSlide === 'a') {
    b.style.backgroundImage = `url('${PHOTOS[slideIndex]}')`;
    b.style.opacity = '1';
    a.style.opacity = '0';
    activeSlide = 'b';
  } else {
    a.style.backgroundImage = `url('${PHOTOS[slideIndex]}')`;
    a.style.opacity = '1';
    b.style.opacity = '0';
    activeSlide = 'a';
  }
  // Preload next
  const img = new Image();
  img.src = PHOTOS[nextIndex];
}

initSlideshow();

}
